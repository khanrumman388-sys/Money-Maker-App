<!DOCTYPE html>
<html>
<head>
  <title>Invoice SaaS</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- username:admin
    password:1234 -->
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .result {
      margin-top: 20px;
      background: #334155;
      padding: 15px;
      border-radius: 10px;
    }

    .item {
      background: #334155;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="box hidden" id="appBox">

  <h2>💰 Invoice Generator</h2>

  <input type="text" id="client" placeholder="Client Name">
  <input type="text" id="service" placeholder="Service">
  <input type="number" id="amount" placeholder="Amount">

  <button onclick="generateInvoice()">Generate Invoice</button>

  <div class="result" id="invoice"></div>

  <button onclick="saveInvoice()">Save Invoice</button>
  <button onclick="downloadPDF()">Download PDF</button>

  <h3>📜 History</h3>
  <div id="history"></div>

</div>

<script>

// LOGIN
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (user === "admin" && pass === "1234") {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("appBox").classList.remove("hidden");
    loadHistory();
  } else {
    alert("Wrong login");
  }
}

// GENERATE
function generateInvoice() {
  let client = document.getElementById("client").value;
  let service = document.getElementById("service").value;
  let amount = document.getElementById("amount").value;

  if (!client || !service || !amount) return alert("Fill all fields");

  let html = `
    <p><b>Client:</b> ${client}</p>
    <p><b>Service:</b> ${service}</p>
    <p><b>Total:</b> $${amount}</p>
  `;

  document.getElementById("invoice").innerHTML = html;
}

// SAVE
function saveInvoice() {
  let inv = document.getElementById("invoice").innerHTML;
  if (!inv) return alert("Generate invoice first");

  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.push(inv);

  localStorage.setItem("history", JSON.stringify(history));
  loadHistory();
}

// LOAD HISTORY
function loadHistory() {
  let history = JSON.parse(localStorage.getItem("history")) || [];
  let div = document.getElementById("history");
  div.innerHTML = "";

  history.forEach(h => {
    div.innerHTML += `<div class="item">${h}</div>`;
  });
}

// PDF
function downloadPDF() {
  let element = document.getElementById("invoice");
  if (!element.innerHTML) return alert("Generate first");

  html2pdf().from(element).save("invoice.pdf");
}

</script>

</body>
</html>
